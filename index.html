<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 BINGO REALTIME 🎰</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; }
        .cell { aspect-ratio: 1; background: #e4e6eb; border: none; border-radius: 5px; font-weight: bold; }
        .cell.selected { background: #ff4757; color: white; }
        .cell.free { background: #ffa502; color: white; }
        button.btn { background: #2ed573; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 BINGO 🎰</h1>
    <div id="room-status" style="font-weight:bold;">ລໍຖ້າເລີ່ມເກມ...</div>
    <div id="host-controls" style="display:none; margin-top:15px;">
        <button class="btn" style="background:#1e90ff;" onclick="drawNumber()">🎲 ສຸ່ມເລກ</button>
        <button class="btn" style="background:#ff4757;" onclick="resetGame()">🔄 ລ້າງກະດານ</button>
    </div>
    <div class="grid" id="bingo-board"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOW0m7tdZl95srB6Mh2AcxNp9GQkTITrl",
        databaseURL: "https://bingoxjennie-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bingoxjennie"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'game_room');

    let myBoard = [];
    const isHost = (new URLSearchParams(window.location.search)).get('host') === 'true';
    if(isHost) document.getElementById('host-controls').style.display = 'block';

    function generateBoard() {
        let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
        nums[12] = "FREE";
        myBoard = nums;
        const board = document.getElementById('bingo-board');
        board.innerHTML = "";
        nums.forEach((n, i) => {
            const btn = document.createElement('button');
            btn.className = "cell" + (n === "FREE" ? " free" : "");
            btn.innerText = n === "FREE" ? "⭐" : n;
            btn.id = "c" + i;
            board.appendChild(btn);
        });
    }

    function checkWin(called) {
        let matrix = [];
        for(let i=0; i<5; i++) matrix.push(myBoard.slice(i*5, i*5+5).map(n => n === "FREE" || called.includes(n)));
        
        let won = false;
        // Rows & Cols
        for(let i=0; i<5; i++) {
            if(matrix[i].every(v => v) || matrix.map(r => r[i]).every(v => v)) won = true;
        }
        // Diagonals
        if([0,1,2,3,4].every(i => matrix[i][i]) || [0,1,2,3,4].every(i => matrix[i][4-i])) won = true;
        
        return won;
    }

    window.drawNumber = () => {
        let n = Math.floor(Math.random() * 75) + 1;
        onValue(gameRef, (snap) => {
            let called = snap.val().called || [];
            if(!called.includes(n)) called.push(n);
            update(gameRef, { called, latest: n });
        }, {onlyOnce: true});
    };

    window.resetGame = () => {
        set(gameRef, { called: [], latest: "", winner: null });
        generateBoard();
    };

    onValue(gameRef, (snap) => {
        const data = snap.val();
        if(!data) return;
        
        document.getElementById('room-status').innerText = data.latest ? "ເລກຫຼ້າສຸດ: " + data.latest : "ລໍຖ້າເລີ່ມເກມ...";
        myBoard.forEach((n, i) => {
            if(data.called?.includes(n) || n === "FREE") document.getElementById('c'+i).classList.add('selected');
        });

        if(checkWin(data.called || [])) {
            alert("🎉 ມີຜູ້ຊະນະແລ້ວ! ກຽມເລີ່ມເກມໃໝ່...");
            if(isHost) resetGame();
        }
    });

    generateBoard();
</script>
</body>
</html>
