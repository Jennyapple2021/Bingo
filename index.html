<!DOCTYPE html>
<html>
<head>
    <title>BINGO X JENNIE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: white; font-family: sans-serif; text-align: center; color: black; }
        .grid { display: grid; grid-template-columns: repeat(5, 50px); gap: 5px; justify-content: center; }
        .cell { width: 50px; height: 50px; border: 2px solid red; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .marked { background: red; color: white; }
    </style>
</head>
<body>
    <h1>BINGO X JENNIE</h1>
    <input id="name" placeholder="ໃສ່ຊື່">
    <button onclick="join()">ເຂົ້າເກມ</button>
    <div id="board" class="grid" style="margin-top: 20px;"></div>

    <script>
        const firebaseConfig = {
            // ເອົາ Config ຈາກ Firebase ມາໃສ່ບ່ອນນີ້ (apiKey, projectId, etc.)
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function join() {
            const name = document.getElementById('name').value;
            if(!name) return alert("ໃສ່ຊື່ກ່ອນ");
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = "";
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = Math.floor(Math.random() * 75) + 1;
                cell.onclick = function() { this.classList.toggle('marked'); };
                board.appendChild(cell);
            }
        }
    </script>
</body>
</html>
