<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 BINGO AUTO-CHECK 🎰</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; }
        .cell { aspect-ratio: 1; background: #e4e6eb; border: none; border-radius: 5px; font-weight: bold; }
        .cell.selected { background: #ff4757; color: white; }
        .cell.free { background: #ffa502; color: white; }
        button.btn { background: #2ed573; color: white; padding: 10px 20px; border: none; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 BINGO 🎰</h1>
    <div id="room-status" style="font-weight:bold; margin-bottom:10px;">กำลังโหลด...</div>
    <div id="host-controls" style="display:none;">
        <button class="btn" onclick="drawNumber()">🎲 สุ่มเลข</button>
        <button class="btn" style="background:#ffa502;" onclick="toggleAutoDraw()">▶️ ออโต้ (5วิ)</button>
    </div>
    <div class="grid" id="bingo-board"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOW0m7tdZl95srB6Mh2AcxNp9GQkTITrl",
        databaseURL: "https://bingoxjennie-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bingoxjennie"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'game_room');

    let myBoard = [];
    let calledNumbers = [];
    let isHost = (new URLSearchParams(window.location.search)).get('host') === 'true';

    if(isHost) document.getElementById('host-controls').style.display = 'block';

    function generateBoard() {
        let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
        nums[12] = "FREE";
        myBoard = nums;
        const board = document.getElementById('bingo-board');
        board.innerHTML = "";
        nums.forEach((n, i) => {
            const btn = document.createElement('button');
            btn.className = "cell" + (n === "FREE" ? " free" : "");
            btn.innerText = n === "FREE" ? "⭐" : n;
            btn.id = "c" + i;
            board.appendChild(btn);
        });
    }

    function checkBingo(called) {
        let matrix = [];
        for(let i=0; i<5; i++) matrix.push(myBoard.slice(i*5, i*5+5).map(n => n === "FREE" || called.includes(n)));
        
        let win = false;
        // Check Rows & Cols
        for(let i=0; i<5; i++) {
            if(matrix[i].every(v => v) || matrix.map(r => r[i]).every(v => v)) win = true;
        }
        // Check Diagonals
        if([0,1,2,3,4].every(i => matrix[i][i]) || [0,1,2,3,4].every(i => matrix[i][4-i])) win = true;

        if(win) {
            update(gameRef, { winner: "🎉 ມີຜູ້ຊະນະແລ້ວ! 🎉" });
        }
    }

    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        if(data) {
            calledNumbers = data.called || [];
            document.getElementById('room-status').innerText = data.latest ? "ເລກຫຼ້າສຸດ: " + data.latest : "ລໍຖ້າເລີ່ມເກມ...";
            
            myBoard.forEach((n, i) => {
                if(calledNumbers.includes(n) || n === "FREE") document.getElementById('c'+i).classList.add('selected');
            });
            
            checkBingo(calledNumbers);
            if(data.winner) alert(data.winner);
        }
    });

    generateBoard();
</script>
</body>
</html>
